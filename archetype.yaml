---
description: "Archetect Master Catalog"
summary: "The top-level Archetect catalog. Entry point for all archetypes, components, libraries, and nested catalogs."
authors: ["Jimmie Fulton <jimmie.fulton@gmail.com>"]
tags: ["catalog"]

requires:
  archetect: "3.0.0"

catalog:
  common:
    description: "Common / Utility"
    catalog:
      gitignore:
        description: "Generate a .gitignore file"
        source: "https://github.com/archetect-common/dot-gitignore-archetype.git"
      starters:
        description: "Archetype, catalog, library, and component starters"
        catalog:
          archetype-starter:
            description: "Scaffold a new Archetect archetype"
            source: "https://github.com/archetect-common/archetype-starter-archetype.git"
          catalog-starter:
            description: "Scaffold a new Archetect catalog"
            source: "https://github.com/archetect-common/catalog-starter-archetype.git"
          library-starter:
            description: "Scaffold a new Archetect library"
            source: "https://github.com/archetect-common/library-starter-archetype.git"
          component-starter:
            description: "Scaffold a new Archetect component"
            source: "https://github.com/archetect-common/component-starter-archetype.git"
      components:
        description: "Reusable prompt components"
        catalog:
          org-prompts:
            description: "Organization and solution name prompts"
            source: "https://github.com/archetect-common/org-prompts-component.git"
          project-prompts:
            description: "Project name prompts (prefix + suffix)"
            source: "https://github.com/archetect-common/project-prompts-component.git"
          author-prompts:
            description: "Author and license prompts"
            source: "https://github.com/archetect-common/author-prompts-component.git"
          github-prompts:
            description: "GitHub repository prompts"
            source: "https://github.com/archetect-common/github-prompts-component.git"
